<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CUE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="logo-mark">C</div>
      <div>
        <div class="logo">CUE</div>
        <div class="tagline">intelligence layer</div>
      </div>
    </div>
    <button id="openSidebarBtn" class="sidebar-btn" title="Open full sidebar">↗ Sidebar</button>
  </div>

  <div class="page-info" id="pageInfo">
    <span class="dot"></span>
    <span id="pageDomain">loading…</span>
  </div>

  <div class="modes">
    <button class="mode-btn" data-action="summarize"  style="--c:#3b82f6">◎ Summarize</button>
    <button class="mode-btn" data-action="keypoints"  style="--c:#8b5cf6">◈ Key Points</button>
    <button class="mode-btn" data-action="critique"   style="--c:#f59e0b">◉ Critique</button>
    <button class="mode-btn" data-action="simplify"   style="--c:#10b981">◇ Simplify</button>
    <button class="mode-btn" data-action="outline"    style="--c:#ec4899">▦ Outline</button>
    <button class="mode-btn" data-action="questions"  style="--c:#06b6d4">? Questions</button>
  </div>

  <div class="divider"></div>

  <div class="ask-row">
    <textarea id="question" placeholder="Ask anything about this page…" rows="2"></textarea>
    <button id="askBtn">↑</button>
  </div>

  <div id="output" class="output">
    <span class="placeholder">Select a mode or ask a question above…</span>
  </div>

  <div class="footer">
    <span id="statusText" class="status"></span>
    <span class="shortcut">⌘⇧K to toggle sidebar</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
